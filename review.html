<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Review Answers | PYQ Quiz Master</title>

<meta
name="description"
content="Review all correct, wrong and skipped answers with explanations.">

<meta
name="keywords"
content="Quiz Review, Answer Review">

<meta
name="author"
content="Hemant Didel">

<meta
name="robots"
content="noindex,nofollow">

<link
rel="canonical"
href="">

<link
rel="icon"
href="assets/favicon.ico">

<link
rel="stylesheet"
href="css/style.css">

<style>

.review-container{
max-width:900px;
margin:30px auto;
padding:20px;
}

.reviewCard{
background:#fff;
padding:20px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
border-left:5px solid #ddd;
}

.reviewCard.correct-card{
border-left-color:#22c55e;
}

.reviewCard.wrong-card{
border-left-color:#ef4444;
}

.reviewCard.skip-card{
border-left-color:#f59e0b;
}

.reviewCard h3{
margin-bottom:15px;
}

.reviewCard .option{
padding:10px 15px;
margin:8px 0;
border:1px solid #ddd;
border-radius:8px;
}

.reviewCard .option.correct{
background:#dcfce7;
border-color:#22c55e;
}

.reviewCard .option.wrong{
background:#fee2e2;
border-color:#ef4444;
}

.status{
display:inline-block;
padding:5px 12px;
border-radius:20px;
font-size:13px;
font-weight:bold;
margin-bottom:12px;
}

.correctStatus{
background:#22c55e;
color:#fff;
}

.wrongStatus{
background:#ef4444;
color:#fff;
}

.skipStatus{
background:#f59e0b;
color:#fff;
}

.explanation{
margin-top:15px;
padding:12px;
background:#eff6ff;
border-left:4px solid #2563eb;
border-radius:8px;
}

.back-btn{
display:block;
width:220px;
margin:35px auto;
text-align:center;
}

</style>

</head>

<body>

<header class="header">

<div class="logo">

🎯 PYQ Quiz Master

</div>

<a
href="result.html"
class="btn">

⬅ Back

</a>

</header>

<main class="review-container">

<h1 class="title">

📝 Answer Review

</h1>

<div id="reviewContainer">

<div class="card">

Loading Review...

</div>

</div>

<a
href="result.html"
class="btn back-btn">

⬅ Back to Result

</a>

</main>

<script src="js/review.js"></script>

</body>

</html>
