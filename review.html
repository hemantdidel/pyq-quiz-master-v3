<!DOCTYPE html>
<html lang="hi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review Answers | PYQ Quiz Master</title>
<meta name="description"
content="Review all correct and incorrect answers with detailed analysis.">

<meta name="keywords"
content="Answer Review, Quiz Review">

<meta name="author"
content="Hemant Didel">

<meta name="robots"
content="noindex,nofollow">

<link rel="icon"
href="assets/favicon.ico">
<link rel="stylesheet" href="css/style.css">
<style>
.review-container{
    max-width:900px;
    margin:30px auto;
    padding:20px;
}
.reviewCard{
    background:#fff;
    padding:20px;
    margin-bottom:20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    border-left:5px solid #ddd;
}
.reviewCard.correct-card{ border-left-color:#4caf50; }
.reviewCard.wrong-card{   border-left-color:#f44336; }
.reviewCard.skip-card{    border-left-color:#ff9800; }
.reviewCard .option{
    padding:10px 15px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #e0e0e0;
}
.reviewCard .option.correct{ background:#d4edda; border-color:#28a745; }
.reviewCard .option.wrong{   background:#f8d7da; border-color:#dc3545; }
.status{
    display:inline-block;
    padding:4px 12px;
    border-radius:20px;
    font-size:13px;
    font-weight:600;
    margin-bottom:10px;
}
.correctStatus{ background:#28a745; color:#fff; }
.wrongStatus{   background:#dc3545; color:#fff; }
.skipStatus{    background:#ff9800; color:#fff; }
.explanation{
    margin-top:12px;
    padding:10px 14px;
    background:#f0f4ff;
    border-left:4px solid #2196f3;
    border-radius:6px;
    font-size:14px;
}
.review-back-btn{
    display:block;
    margin:20px auto;
    padding:12px 28px;
    background:#555;
    color:white;
    border:none;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
}
</style>
</head>

<body>

<header class="header">
    <div class="logo">🎯 PYQ Quiz Master</div>
    <a href="result.html" class="btn">⬅ Back to Result</a>
</header>

<div class="review-container">
    <h1 style="text-align:center;margin-bottom:25px;">📝 Answer Review</h1>
    <div id="reviewContainer"></div>
    <button class="review-back-btn" onclick="window.location.href='result.html'">⬅ Back to Result</button>
</div>

<script src="js/review.js"></script>

</body>
</html>
