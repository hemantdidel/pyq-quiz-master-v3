<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Quiz Result | PYQ Quiz Master</title>

<meta
name="description"
content="Check your quiz result, score, percentage, rank and detailed performance analysis.">

<meta
name="keywords"
content="Quiz Result, Score, Rank, Leaderboard">

<meta
name="author"
content="Hemant Didel">

<meta
name="robots"
content="noindex,nofollow">

<link
rel="canonical"
href="">

<link
rel="icon"
href="assets/favicon.ico">

<link
rel="stylesheet"
href="css/style.css">

<style>

.result-container{
max-width:900px;
margin:30px auto;
padding:20px;
}

.result-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
margin-bottom:25px;
}

.result-card{
background:#fff;
padding:20px;
border-radius:12px;
text-align:center;
border:1px solid #ddd;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.result-card h2{
font-size:2rem;
margin-bottom:8px;
}

.result-card p{
color:#666;
}

.result-progress{
height:22px;
background:#ddd;
border-radius:30px;
overflow:hidden;
margin:25px 0;
}

.result-progress-fill{
width:0%;
height:100%;
background:linear-gradient(90deg,#22c55e,#16a34a);
transition:.8s;
}

.leaderboard-box{
margin-top:35px;
padding:20px;
background:#fff;
border-radius:12px;
border:1px solid #ddd;
}

.leaderboard-box h2{
margin-bottom:15px;
}

#yourRank{
margin:20px 0;
text-align:center;
font-size:20px;
font-weight:bold;
color:#16a34a;
}

#leaderboardList{
margin-top:20px;
}

.result-buttons{
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
margin-top:35px;
}

.result-buttons .btn{
padding:12px 24px;
}

</style>
  
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5SK4X5JMGX"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

gtag('config', 'G-5SK4X5JMGX');
</script>
  
</head>

<body>

<header class="header">

<div class="logo">
🎯 PYQ Quiz Master
</div>

<a
href="index.html"
class="btn">

🏠 Home

</a>

</header>

<main class="result-container">

<h1 class="title">

📊 Quiz Result

</h1>

<div class="result-grid">

<div class="result-card">

<h2 id="score">0</h2>

<p>Score</p>

</div>

<div class="result-card">

<h2
id="correct"
style="color:#16a34a;">

0

</h2>

<p>Correct ✅</p>

</div>

<div class="result-card">

<h2
id="wrong"
style="color:#dc2626;">

0

</h2>

<p>Wrong ❌</p>

</div>

<div class="result-card">

<h2
id="unattempted"
style="color:#f59e0b;">

0

</h2>

<p>Skipped ⏭</p>

</div>

<div class="result-card">

<h2
id="percentage"
style="color:#2563eb;">

0%

</h2>

<p>Percentage</p>

</div>

</div>

<div class="result-progress">

<div
id="progressFill"
class="result-progress-fill">

</div>

</div>

<div class="leaderboard-box">

<h2>

🏆 Global Leaderboard

</h2>

<p style="text-align:center;">

👤 Player :
<strong id="playerNameText"></strong>

</p>

<h3 id="yourRank">

Loading Rank...

</h3>

<div id="leaderboardList">

Loading Leaderboard...

</div>

</div>

<div class="result-buttons">

<button
id="reviewBtn"
class="btn">

📝 Review Answers

</button>

<button
id="retryBtn"
class="btn">

🔄 Retry Test

</button>

<a
href="index.html"
class="btn">

🏠 Home

</a>

</div>

</main>

<script
type="module"
src="js/result.js">

</script>

<script
type="module"
src="js/leaderboard.js">

</script>

</body>

</html>
