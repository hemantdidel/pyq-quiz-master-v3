<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz | PYQ Quiz Master</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="css/quiz.css">

</head>

<body>

<header class="header quiz-header">

<div class="logo">

🎯 PYQ Quiz Master

</div>

<a href="index.html" class="btn">

🏠 Home

</a>

</header>
  
<div id="nameModal" class="name-modal">

    <div class="name-card">

        <h2>🎯 PYQ Quiz Master</h2>

        <p>Test शुरू करने से पहले अपना नाम दर्ज करें</p>

        <input
            type="text"
            id="studentNameInput"
            placeholder="Enter Your Name"
            maxlength="25"
        >

        <button id="startQuizBtn">
            🚀 Start Test
        </button>

    </div>

</div>
  
<div class="quiz-container" id="quizContainer" style="display:none;">

<div class="quiz-top">

<h2 id="quizTitle">

Loading Test...

</h2>

<div id="timer">

⏱ 20:00

</div>

</div>

<div class="progress">

<div id="progressBar"></div>

</div>

<div id="questionNumber">

Question 1 / 20

</div>

<div id="questionBox">

Loading Question...

</div>

<div id="optionsBox">

</div>

<div class="navigation">

<button id="prevBtn">

⬅ Previous

</button>

<button id="nextBtn">

Next ➡

</button>

</div>

<button id="paletteToggle">

📋 Questions

</button>

<div id="palette">

</div>

...
<button id="submitBtn">
🚩 Submit Test
</button>

</div>

<script type="module" src="js/firebase.js"></script>
<script src="js/quiz.js"></script>

</body>
</html>
