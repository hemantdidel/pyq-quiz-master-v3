<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Admin Dashboard | PYQ Quiz Master</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<header class="header">

<div class="logo">
🛠 Admin Dashboard
</div>

<div class="header-actions">

<a href="index.html" class="btn">
🏠 Home
</a>

<button
id="logoutBtn"
class="btn">

🚪 Logout

</button>

</div>

</header>

<main class="container">

<h1 class="title">
📊 Dashboard
</h1>

<!-- Stats -->

<div class="stats-grid">

<div class="card stat-card">

<h2 id="todayUsers">
0
</h2>

<p>
Today's Users
</p>

</div>

<div class="card stat-card">

<h2 id="todayAttempts">
0
</h2>

<p>
Today's Attempts
</p>

</div>

<div class="card stat-card">

<h2 id="avgScore">
0%
</h2>

<p>
Average Score
</p>

</div>

<div class="card stat-card">

<h2 id="highestScore">
0
</h2>

<p>
Highest Score
</p>

</div>

</div>

<!-- Filter -->

<div class="filterBar">

<button class="filterBtn" data-filter="all">
All
</button>

<button class="filterBtn" data-filter="today">
Today
</button>

<button class="filterBtn" data-filter="yesterday">
Yesterday
</button>

<button class="filterBtn" data-filter="week">
Last 7 Days
</button>

<button class="filterBtn" data-filter="month">
This Month
</button>

</div>

<!-- Search -->

<input

id="searchInput"

class="search"

type="text"

placeholder="🔍 Search Player or Test">

<!-- Attempts -->

<div

id="attemptList">

<div class="card">

Loading...

</div>

</div>

</main>

<script type="module" src="js/admin.js"></script>

</body>

</html>
