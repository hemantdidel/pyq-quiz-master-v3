<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Admin Dashboard | PYQ Quiz Master</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="header">

<div class="logo">
🛠 Admin Dashboard
</div>

<div>

<a href="index.html" class="btn">
🏠 Home
</a>

<button
id="logoutBtn"
class="btn"
style="margin-left:10px;">

🚪 Logout

</button>

</div>

</header>

<main class="container">

<h1 class="title">
Dashboard
</h1>

<div class="grid">

<div class="card">
<h2 id="todayUsers">0</h2>
<p>Today's Users</p>
</div>

<div class="card">
<h2 id="todayAttempts">0</h2>
<p>Today's Attempts</p>
</div>

<div class="card">
<h2 id="avgScore">0%</h2>
<p>Average Score</p>
</div>

<div class="card">
<h2 id="highestScore">0</h2>
<p>Highest Score</p>
</div>

<div
style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;">

<button class="btn filterBtn" data-filter="all">
All
</button>

<button class="btn filterBtn" data-filter="today">
Today
</button>

<button class="btn filterBtn" data-filter="yesterday">
Yesterday
</button>

<button class="btn filterBtn" data-filter="week">
Last 7 Days
</button>

<button class="btn filterBtn" data-filter="month">
This Month
</button>

</div>
  
</div>

<input
id="searchInput"
class="search"
placeholder="Search Player...">

<div
id="attemptList"
class="grid">

</div>

</main>

<script type="module" src="js/admin.js"></script>

</body>
</html>
